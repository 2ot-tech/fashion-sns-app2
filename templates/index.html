<!DOCTYPE html>
<html>
<head>
    <title>ZOZO TikTok風</title>
    <style>
        body {
            margin: 0;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            font-family: sans-serif;
        }

        .post {
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
            color: white;
        }

        video {
            height: 100%;
        }

        .info {
            position: absolute;
            bottom: 80px;
            left: 20px;
        }

        .buttons {
            position: absolute;
            right: 20px;
            bottom: 120px;
        }

        .top-bar {
            position: fixed;
            top: 10px;
            right: 20px;
            z-index: 1000;
        }

        .search {
            position: fixed;
            top: 10px;
            left: 20px;
            z-index: 1000;
        }

        .user {
            position: fixed;
            top: 10px;
            right: 150px;
            z-index: 1000;
        }

        a {
            color: white;
            text-decoration: none;
        }

        .btn {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<!-- 👤 ログイン表示 -->
<div class="user">
{% if user %}
    {{ user }} さん
    <a href="/logout">ログアウト</a>
{% else %}
    <a href="/login">ログイン</a>
{% endif %}
</div>

<!-- 🔍 検索 -->
<div class="search">
    <form action="/search" method="GET">
        <input name="q" placeholder="タグ検索（例：春）">
        <button type="submit">検索</button>
    </form>
</div>

<!-- ＋投稿 -->
<div class="top-bar">
    <a href="/create" class="btn">＋投稿</a>
</div>

{% for post in posts %}
<div class="post">
    <video src="{{ post[2] }}" autoplay loop muted></video>

    <div class="info">
        <h2>{{ post[1] }}</h2>

        <!-- タグ -->
        <p>
        {% for tag in post[4].split() %}
            <a href="/search?q={{ tag }}">#{{ tag }}</a>
        {% endfor %}
        </p>

        <a href="{{ post[3] }}" target="_blank" class="btn">商品を見る</a>
    </div>

    <div class="buttons">
        <a href="/save/{{ post[0] }}" class="btn">
            ❤️ {{ post[6] }}
        </a>
    </div>
</div>
{% endfor %}

</body>
</html>
